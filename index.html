<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales & Revenue Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<h1>Sales & Revenue Analysis Dashboard</h1>

<div class="cards">

<div class="card">
<h2>Total Sales</h2>
<p id="sales">₹1,20,000</p>
</div>

<div class="card">
<h2>Total Revenue</h2>
<p id="revenue">₹2,50,000</p>
</div>

<div class="card">
<h2>Top Product</h2>
<p>Laptop</p>
</div>

</div>

<div class="chart">
<canvas id="salesChart"></canvas>
</div>

<script src="script.js"></script>

</body>
</html>
